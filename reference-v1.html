<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>StudyFlow — El teu assistent d'estudi científic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafafa;--s:#fff;--sh:#f5f5f5;--b:#e5e5e5;--bl:#f0f0f0;
  --t:#171717;--ts:#737373;--tm:#a3a3a3;
  --a:#2563eb;--al:#dbeafe;--ad:#1d4ed8;
  --ok:#059669;--okl:#d1fae5;--w:#d97706;--wl:#fef3c7;
  --err:#dc2626;--errl:#fee2e2;--p:#7c3aed;--pl:#ede9fe;
  --i:#6366f1;--il:#e0e7ff;--r:#e11d48;--rl:#ffe4e6;
}
[data-theme="dark"]{
  --bg:#0a0a0a;--s:#171717;--sh:#262626;--b:#333;--bl:#1e1e1e;
  --t:#f5f5f5;--ts:#a3a3a3;--tm:#737373;
  --a:#3b82f6;--al:#1e3a5f;--ad:#60a5fa;
  --ok:#10b981;--okl:#064e3b;--w:#f59e0b;--wl:#78350f;
  --err:#ef4444;--errl:#7f1d1d;--p:#8b5cf6;--pl:#3b0764;
  --i:#818cf8;--il:#312e81;--r:#fb7185;--rl:#881337;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t);display:flex;height:100vh;overflow:hidden}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}

/* SIDEBAR */
.sb{width:220px;background:var(--s);border-right:1px solid var(--b);padding:20px 12px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;overflow-y:auto}
.sb-brand{padding:0 10px 16px;border-bottom:1px solid var(--bl);margin-bottom:8px}
.sb-brand h1{font-size:18px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,var(--a),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-brand p{font-size:11px;color:var(--tm);margin-top:2px}
.nb{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:9px;border:none;background:transparent;color:var(--ts);font-size:13px;font-weight:500;width:100%;text-align:left;transition:.15s}
.nb:hover{background:var(--sh)}
.nb.on{background:var(--a);color:#fff;font-weight:600}
.nb svg{width:17px;height:17px;flex-shrink:0}
.sb-ft{margin-top:auto;padding:14px 10px;border-top:1px solid var(--bl);font-size:12px}
.sb-ft .row{display:flex;justify-content:space-between;margin-bottom:5px}
.sb-ft .k{color:var(--ts)}.sb-ft .v{font-weight:700}

/* MAIN */
.mn{flex:1;overflow-y:auto;padding:24px 30px}
.sec{display:none;flex-direction:column;gap:18px;max-width:920px}
.sec.on{display:flex}

/* CARDS */
.c{background:var(--s);border-radius:13px;border:1px solid var(--b);padding:22px;transition:.15s}
.c:hover{box-shadow:0 2px 12px rgba(0,0,0,.04)}

/* BUTTONS */
.bp{background:var(--a);color:#fff;border:none;border-radius:9px;padding:9px 18px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.bp:hover{background:var(--ad)}
.bs{background:transparent;color:var(--ts);border:1px solid var(--b);border-radius:9px;padding:9px 18px;font-weight:500;font-size:13px;display:inline-flex;align-items:center;gap:7px}
.bs:hover{background:var(--sh)}
.bi{background:none;border:none;color:var(--tm);padding:6px;border-radius:7px}
.bi:hover{background:var(--sh)}

/* INPUTS */
.inp{width:100%;padding:9px 13px;border-radius:9px;border:1px solid var(--b);font-size:13px;color:var(--t);background:var(--bg);outline:none}
.inp:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--al)}
textarea.inp{resize:vertical;min-height:80px}
.lbl{font-size:11px;font-weight:600;color:var(--ts);display:block;margin-bottom:5px}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* STAT CARD */
.sc{display:flex;flex-direction:column;gap:8px;padding:16px}
.sc .top{display:flex;align-items:center;justify-content:space-between}
.sc .top span{font-size:12px;color:var(--ts);font-weight:500}
.sc .ib{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.sc .val{font-size:20px;font-weight:800}
.sc .sub{font-size:11px;color:var(--tm)}

/* BADGES */
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;display:inline-block}

/* TASK ITEMS */
.ti{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:9px;cursor:pointer;transition:.12s;background:var(--bg);border:1px solid transparent}
.ti:hover{background:var(--sh)}
.ti.done{background:var(--okl);border-color:rgba(5,150,105,.2);opacity:.65}
.ti .info{flex:1}.ti .nm{font-size:13px;font-weight:600}
.ti.done .nm{text-decoration:line-through}
.ti .ds{font-size:11px;color:var(--ts);margin-top:1px}
.ti .tg{font-size:10px;color:var(--tm);white-space:nowrap}

/* TIMER */
.tmr-circle{position:relative;width:220px;height:220px;margin:25px auto}
.tmr-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.tmr-time .dig{font-size:48px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-2px}
.tmr-time .sub{font-size:12px;color:var(--tm);margin-top:3px}

/* FLASHCARD */
.fc{min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;cursor:pointer;user-select:none;transition:.3s}
.fc .q{font-size:18px;font-weight:700;line-height:1.5}
.fc .a{font-size:16px;color:var(--ok);font-weight:600;margin-top:12px;line-height:1.5}
.fc .hint{font-size:12px;color:var(--tm);margin-top:16px}

/* FEYNMAN CHAT */
.chat-area{max-height:350px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:10px 0}
.msg{max-width:80%;padding:12px 16px;border-radius:14px;font-size:13px;line-height:1.6}
.msg.user{align-self:flex-end;background:var(--a);color:#fff;border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:var(--sh);color:var(--t);border-bottom-left-radius:4px}
.chat-input{display:flex;gap:8px;margin-top:10px}
.chat-input input{flex:1}

/* BREATHING */
.breath-circle{width:160px;height:160px;border-radius:50%;background:linear-gradient(135deg,var(--al),var(--il));display:flex;align-items:center;justify-content:center;margin:20px auto;font-size:16px;font-weight:700;color:var(--a);transition:transform 4s ease-in-out}
.breath-circle.inhale{transform:scale(1.4)}
.breath-circle.exhale{transform:scale(1)}

/* MODE CARDS */
.mc{text-align:left;padding:16px;cursor:pointer;border:2px solid var(--b);transition:.2s}
.mc.on{border-color:var(--a);background:var(--al)}
.mc .mn-name{font-size:14px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.mc.on .mn-name{color:var(--a)}
.mc .mn-desc{font-size:11px;color:var(--ts)}

/* PROGRESS BARS */
.pb{height:6px;background:var(--bl);border-radius:3px;overflow:hidden}
.pb .fill{height:100%;border-radius:3px;transition:width .5s ease}

/* ZEIGARNIK NOTE */
.zeig{background:linear-gradient(135deg,var(--wl),var(--rl));border:none;position:relative}
.zeig::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--w);border-radius:13px 0 0 13px}

/* GRADIENT */
.grad{background:linear-gradient(135deg,var(--al),var(--pl));border:none}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--tm)}
.empty svg{margin-bottom:10px;opacity:.3}
.empty p{font-size:13px;margin-top:6px}

/* RESPONSIVE */
@media(max-width:768px){
  body{flex-direction:column}
  .sb{width:100%;flex-direction:row;padding:10px;overflow-x:auto;gap:4px;border-right:none;border-bottom:1px solid var(--b)}
  .sb-brand,.sb-ft{display:none}
  .nb{white-space:nowrap;padding:8px 12px;font-size:12px}
  .mn{padding:14px}
  .g2,.g3,.g4{grid-template-columns:1fr}
}

/* TAB HEADERS */
.sec-hdr{margin-bottom:4px}
.sec-hdr h2{font-size:18px;font-weight:900}
.sec-hdr p{font-size:12px;color:var(--ts);margin-top:3px}

/* STRETCH ANIMATION */
.stretch-fig{width:120px;height:120px;border-radius:50%;background:var(--il);display:flex;align-items:center;justify-content:center;margin:10px auto;font-size:40px}
@keyframes breathAnim{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
.breathing{animation:breathAnim 8s ease-in-out infinite}

/* CHAOS MODE */
.chaos-problem{background:var(--bg);border:2px solid var(--b);border-radius:12px;padding:24px;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.chaos-problem .topic-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px}
.chaos-problem .problem-text{font-size:16px;font-weight:600;line-height:1.6}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sb" id="sidebar">
  <div class="sb-brand"><h1>StudyFlow</h1><p>Ciència del rendiment acadèmic</p></div>
  <button class="nb on" data-tab="dashboard" onclick="go('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard
  </button>
  <button class="nb" data-tab="timer" onclick="go('timer')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Timer
  </button>
  <button class="nb" data-tab="cards" onclick="go('cards')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Flashcards
  </button>
  <button class="nb" data-tab="feynman" onclick="go('feynman')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Tutor Feynman
  </button>
  <button class="nb" data-tab="chaos" onclick="go('chaos')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Mode Caos
  </button>
  <button class="nb" data-tab="recovery" onclick="go('recovery')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>Recuperació
  </button>
  <button class="nb" data-tab="exams" onclick="go('exams')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Exàmens
  </button>
  <button class="nb" data-tab="techniques" onclick="go('techniques')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Tècniques
  </button>
  <div class="sb-ft">
    <div class="row"><span class="k">Sessions avui</span><span class="v" id="sb-sess">0</span></div>
    <div class="row"><span class="k">Força memòria</span><span class="v" id="sb-str">0%</span></div>
    <div class="row"><span class="k">Ratxa</span><span class="v" id="sb-streak">1d</span></div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="bs" style="flex:1;padding:6px;font-size:11px;justify-content:center" onclick="toggleDark()" id="dark-btn">🌙 Fosc</button>
      <button class="bs" style="flex:1;padding:6px;font-size:11px;justify-content:center" onclick="exportData()">💾</button>
      <button class="bs" style="flex:1;padding:6px;font-size:11px;justify-content:center" onclick="$('import-file').click()">📂</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="mn">
  <div class="sec on" id="sec-dashboard"></div>
  <div class="sec" id="sec-timer"></div>
  <div class="sec" id="sec-cards"></div>
  <div class="sec" id="sec-feynman"></div>
  <div class="sec" id="sec-chaos"></div>
  <div class="sec" id="sec-recovery"></div>
  <div class="sec" id="sec-exams"></div>
  <div class="sec" id="sec-techniques"></div>
</div>

<script>
// ═══════════════════════════════════════════
// STATE & PERSISTENCE
// ═══════════════════════════════════════════
const KEY="sf2";
const defaults={
  // Stats
  todaySess:0, totalMin:0, streak:1, lastDate:null, pomCount:0,
  weekly:[{d:"Dl",m:0},{d:"Dt",m:0},{d:"Dc",m:0},{d:"Dj",m:0},{d:"Dv",m:0},{d:"Ds",m:0},{d:"Dg",m:0}],
  // Exams
  exams:[],
  // Flashcards (each: {id,q,a,subject,hits:0,nextReview:date,strength:0,interval:1})
  decks:[], // [{id,name,cards:[]}]
  // Completed tasks
  doneTasks:[],
  // Chaos mode problems
  chaosProblems:[], // [{id,topic,text,solution,difficulty}]
  // Zeigarnik notes
  zNote:"",
  // Feynman chat history
  feynmanHistory:[],
  // Memory strength (0-100 based on quiz performance)
  memStrength:0,
  // Quiz stats
  quizTotal:0, quizCorrect:0,
  // Cards reviewed today
  cardsToday:0,
};
let S;
try{const r=localStorage.getItem(KEY);S=r?{...defaults,...JSON.parse(r)}:{...defaults}}catch(e){S={...defaults}}
const today=()=>new Date().toISOString().split("T")[0];
if(S.lastDate&&S.lastDate!==today()){
  const d=Math.floor((new Date(today())-new Date(S.lastDate))/864e5);
  if(d===1&&S.todaySess>0)S.streak++;else if(d>1)S.streak=1;
  S.todaySess=0;S.cardsToday=0;
  // Reset weekly on Monday
  const dow=new Date().getDay();
  if(dow===1&&d>=1)S.weekly=[{d:"Dl",m:0},{d:"Dt",m:0},{d:"Dc",m:0},{d:"Dj",m:0},{d:"Dv",m:0},{d:"Ds",m:0},{d:"Dg",m:0}];
}
function save(){S.lastDate=today();localStorage.setItem(KEY,JSON.stringify(S))}

// ═══════════════════════════════════════════
// DARK MODE
// ═══════════════════════════════════════════
function toggleDark(){
  const isDark=document.documentElement.getAttribute("data-theme")==="dark";
  document.documentElement.setAttribute("data-theme",isDark?"":"dark");
  localStorage.setItem("sf2-dark",isDark?"":"dark");
  const btn=$("dark-btn");if(btn)btn.textContent=isDark?"🌙 Fosc":"☀️ Clar";
}
(function(){const t=localStorage.getItem("sf2-dark");if(t==="dark"){document.documentElement.setAttribute("data-theme","dark");setTimeout(()=>{const b=$("dark-btn");if(b)b.textContent="☀️ Clar"},50)}})();

// ═══════════════════════════════════════════
// NOTIFICATION SOUND (Web Audio API)
// ═══════════════════════════════════════════
function playNotifSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523.25,659.25,783.99].forEach((freq,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.type="sine";osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.3,ctx.currentTime+i*0.15);
      gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+i*0.15+0.3);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(ctx.currentTime+i*0.15);osc.stop(ctx.currentTime+i*0.15+0.3);
    });
  }catch(e){}
}

// ═══════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`studyflow-backup-${today()}.json`;a.click();URL.revokeObjectURL(a.href);
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      S={...defaults,...d};save();render();
      alert("✅ Dades importades correctament!");
    }catch(err){alert("❌ Error al llegir el fitxer")}
  };r.readAsText(f);ev.target.value="";
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
let tab="dashboard";
function go(t){
  tab=t;
  document.querySelectorAll(".nb").forEach(b=>b.classList.toggle("on",b.dataset.tab===t));
  document.querySelectorAll(".sec").forEach(s=>s.classList.toggle("on",s.id===`sec-${t}`));
  render();
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function fmtTime(s){return`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`}
function fmtDate(d){const dt=new Date(d+"T12:00:00"),ds=["Dg","Dl","Dt","Dc","Dj","Dv","Ds"],ms=["gen","feb","mar","abr","mai","jun","jul","ago","set","oct","nov","des"];return`${ds[dt.getDay()]} ${dt.getDate()} ${ms[dt.getMonth()]}`}
function daysUntil(d){const n=new Date();n.setHours(0,0,0,0);const t=new Date(d+"T12:00:00");t.setHours(0,0,0,0);return Math.ceil((t-n)/864e5)}
function uid(){return Date.now()+Math.random().toString(36).substr(2,5)}
function $(id){return document.getElementById(id)}
function html(id,h){const el=$(id);if(el)el.innerHTML=h}

// ═══════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════
const MODES=[
  {id:"pom",nm:"Pomodoro",w:25*60,r:5*60,lr:15*60,ico:"⏱",ds:"25/5 min",ideal:"Flashcards, repàs, organització"},
  {id:"d90",nm:"Deep Work 90",w:90*60,r:27*60,ico:"⚡",ds:"90/27 min",ideal:"Mates, física, programació"},
  {id:"d120",nm:"Deep Work 120",w:120*60,r:36*60,ico:"🔥",ds:"120/36 min",ideal:"Immersió total, projectes complexos"},
];
let tmMode=0,tmLeft=MODES[0].w,tmRun=false,tmRest=false,tmInt=null;
function tmStart(){
  if(tmRun)return;tmRun=true;
  tmInt=setInterval(()=>{
    tmLeft--;
    if(tmLeft<=0){
      clearInterval(tmInt);tmRun=false;
      playNotifSound();
      if(!tmRest){
        const mins=Math.round(MODES[tmMode].w/60);
        S.totalMin+=mins;S.todaySess++;S.pomCount++;
        const di=new Date().getDay(),mi=di===0?6:di-1;
        S.weekly[mi].m+=mins;save();
        tmRest=true;
        tmLeft=MODES[tmMode].id==="pom"&&S.pomCount%4===0?(MODES[tmMode].lr||MODES[tmMode].r):MODES[tmMode].r;
      }else{tmRest=false;tmLeft=MODES[tmMode].w}
      renderTimer();
    }
    updateTimerDisplay();
  },1000);
  renderTimer();
}
function tmPause(){tmRun=false;clearInterval(tmInt);renderTimer()}
function tmReset(){tmRun=false;tmRest=false;clearInterval(tmInt);tmLeft=MODES[tmMode].w;renderTimer()}
function tmSetMode(i){tmMode=i;tmRun=false;tmRest=false;clearInterval(tmInt);tmLeft=MODES[i].w;renderTimer()}
function updateTimerDisplay(){
  const d=$("tm-dig");if(d)d.textContent=fmtTime(tmLeft);
  const m=MODES[tmMode],tot=tmRest?m.r:m.w,pct=((tot-tmLeft)/tot)*100;
  const c=$("tm-circ");if(c){const r=100,cr=2*Math.PI*r;c.style.strokeDashoffset=`${cr*(1-pct/100)}`}
}

// ═══════════════════════════════════════════
// FLASHCARDS — Regla del 3 + SRS
// ═══════════════════════════════════════════
let curDeck=null,curCard=null,showAns=false,sessionHits=0;

function addDeck(name){
  if(!name)return;
  S.decks.push({id:uid(),name,cards:[]});save();renderCards();
}
function addCard(deckId,q,a,subject){
  const dk=S.decks.find(d=>d.id===deckId);
  if(!dk||!q||!a)return;
  dk.cards.push({id:uid(),q,a,subject:subject||"General",hits:0,sessionHits:0,nextReview:today(),strength:0,interval:1,lastSeen:null});
  save();renderCards();
}
function deleteDeck(id){S.decks=S.decks.filter(d=>d.id!==id);if(curDeck===id)curDeck=null;save();renderCards()}
function deleteCard(deckId,cardId){
  const dk=S.decks.find(d=>d.id===deckId);
  if(dk)dk.cards=dk.cards.filter(c=>c.id!==cardId);
  save();renderCards();
}

function getDueCards(deckId){
  const dk=S.decks.find(d=>d.id===deckId);
  if(!dk)return[];
  return dk.cards.filter(c=>!c.nextReview||c.nextReview<=today());
}

function startReview(deckId){
  curDeck=deckId;
  const due=getDueCards(deckId);
  if(due.length===0){curCard=null;renderCards();return}
  // Reset session hits for this session
  due.forEach(c=>c.sessionHits=0);
  curCard=due[0];showAns=false;sessionHits=0;
  renderCards();
}

function revealAnswer(){showAns=true;renderCards()}

function gradeCard(correct){
  if(!curCard||!curDeck)return;
  const dk=S.decks.find(d=>d.id===curDeck);
  const card=dk.cards.find(c=>c.id===curCard.id);
  if(!card)return;

  S.quizTotal++;
  if(correct){
    S.quizCorrect++;
    card.sessionHits=(card.sessionHits||0)+1;
    card.hits++;

    // REGLA DEL 3: necessita 3 encerts en la mateixa sessió
    if(card.sessionHits>=3){
      // Enviar a SRS — incrementar interval
      card.strength=Math.min(100,card.strength+15);
      card.interval=Math.min(90,Math.round(card.interval*2.2));
      const next=new Date();next.setDate(next.getDate()+card.interval);
      card.nextReview=next.toISOString().split("T")[0];
      card.lastSeen=today();
    }
  }else{
    // Reset session hits — ha de tornar a aconseguir 3
    card.sessionHits=0;
    card.strength=Math.max(0,card.strength-10);
    card.interval=1;
    card.nextReview=today();
  }

  S.cardsToday++;
  // Update global memory strength
  S.memStrength=S.quizTotal>0?Math.round((S.quizCorrect/S.quizTotal)*100):0;
  save();

  // Next card
  const due=getDueCards(curDeck).filter(c=>c.sessionHits<3);
  if(due.length>0){
    // Prioritze cards with fewer session hits
    due.sort((a,b)=>(a.sessionHits||0)-(b.sessionHits||0));
    curCard=due[0];showAns=false;
  }else{
    curCard=null;curDeck=null; // Session complete!
  }
  renderCards();
}

let feynTopic="",feynMessages=[];
const JARGON_PATTERNS=["paradigma","axiomàtic","epistemològic","ontològic","heurístic","sinàptic","neurocognitiu","metacogni","algorítmic","exponencial","logarítmic","derivada parcial","integral definida","isomorfisme","homeomorfisme","estequiometria","termodinàmic"];

function startFeynman(topic){
  feynTopic=topic;
  feynMessages=[{role:"ai",text:`D'acord, jo seré un nen de 5 anys molt curiós. 🧒\n\nExplica'm: "${topic}"\n\nQuè és això? Fes-ho tan simple que ho pugui entendre qualsevol persona. Res de paraules difícils!`}];
  renderFeynman();
}

function sendFeynman(userText){
  if(!userText.trim())return;
  feynMessages.push({role:"user",text:userText});

  // Analyze response
  const lower=userText.toLowerCase();
  const usesJargon=JARGON_PATTERNS.some(j=>lower.includes(j));
  const tooShort=userText.split(" ").length<15;
  const hasAnalogy=lower.includes("com si")||lower.includes("imagina")||lower.includes("per exemple")||lower.includes("és com");
  const asksWhy=Math.random()<0.4; // 40% chance of "why" follow-up

  let aiResp="";

  if(usesJargon){
    // DETECCIÓ D'IL·LUSIÓ DE COMPETÈNCIA
    const jFound=JARGON_PATTERNS.find(j=>lower.includes(j));
    aiResp=`⚠️ ALERTA: Il·lusió de competència detectada!\n\nHas usat la paraula "${jFound}" — això és jerga tècnica. Si realment ho entens, hauries de poder dir-ho sense paraules difícils.\n\nProva de nou: explica'm el MATEIX però com si jo tingués 5 anys i no sabessis cap paraula complicada. Usa una analogia de la vida real.`;
  }else if(tooShort){
    aiResp=`Mmm, em sembla que has dit molt poc! 🤔\n\nNecessito més detalls. Pots explicar-me:\n• Com funciona pas a pas?\n• Per què passa això i no una altra cosa?\n• Dona'm un exemple que pugui veure o tocar.`;
  }else if(!hasAnalogy&&Math.random()<0.5){
    aiResp=`Entenc una mica... però em costaria explicar-ho a un amic. 🤔\n\nPots posar-me un EXEMPLE o una ANALOGIA? Algo com "és com quan...".\n\nLes analogies fan que el cervell connecti la info nova amb coses que ja sap.`;
  }else if(asksWhy){
    // INTERROGACIÓ ELABORATIVA
    const whyQuestions=[
      `Interessant! Però... ¿PER QUÈ passa això? Quina és la raó de fons?`,
      `Vale, ho entenc! Però... ¿com es relaciona això amb ${feynTopic.split(" ")[0]}? Connecta-ho!`,
      `I si fos al revés, què passaria? ¿Per què no funciona d'una altra manera?`,
      `Molt bé! Ara explica'm: ¿en què es DIFERENCIA de [un concepte similar]? Quina és la diferència clau?`,
      `M'encanta l'explicació! 🎉 Ara la pregunta difícil: ¿podries explicar QUAN NO funciona o quina és l'excepció?`
    ];
    aiResp=whyQuestions[Math.floor(Math.random()*whyQuestions.length)];
  }else{
    // Good explanation!
    const praises=[
      `WOW! Ara sí que ho entenc! 🎉🧠\n\nL'explicació és clara i simple. Nota: la capacitat d'explicar-ho fàcilment demostra que realment ho comprens.\n\n✅ Feynman aprovat! Vols provar amb un altre concepte?`,
      `Perfecte! 🌟 Ho has explicat genial — sense paraules rares i amb exemples clars.\n\nAquest nivell de comprensió és el que diferencia memoritzar de ENTENDRE. Ara aquest concepte és teu.\n\n✅ Pots continuar amb un tema nou!`,
      `Increïble! 🚀 La teva explicació ha estat neta, clara i amb analogia.\n\nAixò és exactament el que Feynman demanava: si no ho pots explicar simple, no ho entens. Tu SÍ ho entens!\n\n✅ Tema dominat!`
    ];
    aiResp=praises[Math.floor(Math.random()*praises.length)];
  }

  feynMessages.push({role:"ai",text:aiResp});
  renderFeynman();
}

function startBreathing(){
  breathActive=true;breathCount=0;breathPhase="inhale";
  renderRecovery();
  breathCycle();
}
function breathCycle(){
  if(!breathActive)return;
  breathPhase="inhale";renderBreathUI();
  breathTimer=setTimeout(()=>{
    breathPhase="hold";renderBreathUI();
    breathTimer=setTimeout(()=>{
      breathPhase="exhale";renderBreathUI();
      breathTimer=setTimeout(()=>{
        breathCount++;
        if(breathCount>=8){breathActive=false;renderRecovery();return}
        breathCycle();
      },6000);
    },4000);
  },4000);
}
function stopBreathing(){breathActive=false;clearTimeout(breathTimer);renderRecovery()}

  const el=$("breath-orb");

function genStudyTasks(){
  const tasks=[],td=today();
  S.exams.forEach(ex=>{
    if(daysUntil(ex.date)<0)return;
    const iv=ex.difficulty==="difícil"?[0,1,2,4,7,14]:ex.difficulty==="mitjà"?[0,1,3,7,14]:[0,2,5,12];
    iv.forEach(i=>{
      const sd=new Date(ex.date+"T12:00:00");sd.setDate(sd.getDate()-i);
      const ss=sd.toISOString().split("T")[0];
      if(ss>=td){
        const session=i===0?"Repàs final + simulacre":i<=2?"Recuperació activa intensiva (Regla del 3)":i<=7?"Pràctica intercalada + Feynman":"Primera passada + Interrogació elaborativa";
        tasks.push({id:`${ex.id}-${i}`,examName:ex.name,subject:ex.subject,date:ss,session,daysBefore:i});
      }
    });
  });
  return tasks.sort((a,b)=>a.date.localeCompare(b.date));
}

  const i=S.doneTasks.indexOf(id);
  i>=0?S.doneTasks.splice(i,1):S.doneTasks.push(id);

    <div style="display:flex;align-items:center;justify-content:space-between">

      <p style="font-size:12px;color:var(--ts)">Repetició espaïada automàtica basada en el model RAD</p></div>
      <button class="bp" onclick="$('exam-form').style.display=$('exam-form').style.display==='none'?'block':'none'">+ Nou examen</button>
    </div>
    <div id="exam-form" class="c" style="display:none;border:2px solid var(--al)">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:14px">Afegir examen</h3>
      <div class="g2" style="margin-bottom:10px">
        <div><label class="lbl">Nom</label><input class="inp" id="ex-nm" placeholder="Examen de Mates T5"></div>
        <div><label class="lbl">Assignatura</label><input class="inp" id="ex-sub" placeholder="Matemàtiques"></div>
        <div><label class="lbl">Data</label><input type="date" class="inp" id="ex-dt"></div>
        <div><label class="lbl">Dificultat</label><select class="inp" id="ex-df"><option value="fàcil">Fàcil</option><option value="mitjà" selected>Mitjà</option><option value="difícil">Difícil</option></select></div>
      </div>
      <button class="bp" onclick="addExam($('ex-nm').value,$('ex-sub').value,$('ex-dt').value,$('ex-df').value);$('exam-form').style.display='none'">✓ Afegir</button>
    </div>
    ${S.exams.length>0?`<div class="c">
      <h3 style="font-size:15px;font-weight:800;margin-bottom:14px">Exàmens</h3>
      ${S.exams.map(e=>{const d=daysUntil(e.date),past=d<0,uc=d<=2?"var(--err)":d<=7?"var(--w)":"var(--ok)",bg=d<=2?"var(--errl)":d<=7?"var(--wl)":"var(--okl)";
      return`<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;background:var(--bg);margin-bottom:6px;${past?"opacity:.5":""}">
        <div style="width:40px;height:40px;border-radius:9px;background:${bg};color:${uc};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px">${past?"✓":d}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:700">${e.name}</div><div style="font-size:11px;color:var(--ts)">${e.subject} · ${fmtDate(e.date)} · ${e.difficulty}</div></div>
        <button class="bi" onclick="removeExam('${e.id}')">🗑</button>
      </div>`}).join("")}
    </div>`:""}
    ${tasks.length>0?`<div class="c">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <h3 style="font-size:15px;font-weight:800">📋 Pla d'estudi (SRS automàtic)</h3>
        <span style="font-size:11px;color:var(--tm)">${tasks.length} sessions</span>
      </div>
      <div style="max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:5px">
        ${tasks.slice(0,40).map(t=>{const isTd=t.date===today();
        return`<div class="ti ${S.doneTasks.includes(t.id)?'done':''}" style="${isTd?'background:var(--al);border-color:rgba(37,99,235,.15)':''}" onclick="toggleTask('${t.id}')">
          <span style="font-size:14px">${S.doneTasks.includes(t.id)?'✅':'⭕'}</span>
          <div class="info"><span class="nm">${t.examName}</span> <span class="ds">— ${t.session}</span></div>
          <span class="tg" style="${isTd?'color:var(--a);font-weight:700':''}">${isTd?"AVUI":fmtDate(t.date)}</span>
        </div>`}).join("")}
      </div>
    </div>`:""}
  `);
}

function renderTechniques(){
  const techs=[
    {nm:"Recuperació Activa",ico:"🧠",rat:"Alta",bg:"var(--al)",col:"var(--a)",sum:"Extrau info de la memòria sense ajuda. 3 recuperacions correctes per sessió.",
    steps:["Llegeix 15-20 min","Tanca apunts","Escriu TOT el que recordis","Compara i marca errors","Repeteix fins 3 encerts consecutius","Programa repàs (2d, 7d, 21d)"]},
    {nm:"Repetició Espaïada",ico:"🔄",rat:"Alta",bg:"var(--pl)",col:"var(--p)",sum:"Intervals creixents. 1h × 5 dies > 5h × 1 dia.",
    steps:["Dia 0: Estudi + 3 recuperacions","Dia 2: Primer repàs","Dia 7: Segon repàs","Dia 21: Tercer repàs","Dia 45+: Manteniment","Usa Anki o el sistema de Flashcards"]},
    {nm:"Tècnica Feynman",ico:"💡",rat:"Alta",bg:"var(--wl)",col:"var(--w)",sum:"+21% metacognició, +34% rendiment analític. Destrueix il·lusions.",
    steps:["Escriu el concepte","Explica-ho amb paraules simples","Identifica buits de coneixement","Omple buits als apunts","Simplifica amb analogies","Repeteix fins fluïdesa total"]},
    {nm:"Pràctica Intercalada",ico:"⚡",rat:"Mod-Alta",bg:"var(--okl)",col:"var(--ok)",sum:"Barreja problemes. Entrena discriminació inductiva.",
    steps:["Selecciona 3-4 temes","Barreja en ordre aleatori","NO miris apunts!","Identifica errors de categorització","Augmenta similitud","Ideal per STEM"]},
    {nm:"Interrogació Elaborativa",ico:"👁",rat:"Moderada",bg:"var(--rl)",col:"var(--r)",sum:"Per què és cert? Connecta info nova amb xarxes existents.",
    steps:["Llegeix una afirmació","Pregunta: Per què?","Genera explicació causal","Compara amb conceptes similars","Connecta amb experiències","Combina amb diagrames (Codificació Dual)"]},
    {nm:"NSDR",ico:"🌙",rat:"Recuperació",bg:"var(--il)",col:"var(--i)",sum:"+65% dopamina, renta cortisol, reinicia atenció executiva.",
    steps:["Estira't, tanca ulls","3-5 respiracions diafragmàtiques","Escaneja cos de cap a peus","Mantén consciència 10-20 min","Ones theta sense dormir","Obre ulls lentament"]}
  ];
  html("sec-techniques",`
    <div class="sec-hdr"><h2>📚 Tècniques d'Estudi Científiques</h2>
    <p style="font-size:12px;color:var(--ts)">Basades en Dunlosky et al. (2013) i metaanàlisis replicats</p></div>
    <div class="c" style="background:var(--errl);border-color:rgba(220,38,38,.15)">
      <div style="display:flex;gap:12px"><span style="font-size:18px">⛔</span>
      <div><h4 style="font-size:14px;font-weight:700;color:var(--err)">NO funcionen: Rellegir, Subratllar, Resums passius</h4>
      <p style="font-size:12px;line-height:1.6">Impacte NUL demostrat. El cervell confon familiaritat visual amb aprenentatge. Si no pots explicar-ho sense apunts, no ho saps.</p></div></div>
    </div>
    ${techs.map(t=>`<div class="c" style="padding:0;overflow:hidden;cursor:pointer" onclick="this.querySelector('.tbody').style.display=this.querySelector('.tbody').style.display==='block'?'none':'block'">
      <div style="display:flex;align-items:center;gap:12px;padding:16px 18px">
        <div style="width:40px;height:40px;border-radius:10px;background:${t.bg};display:flex;align-items:center;justify-content:center;font-size:20px">${t.ico}</div>
        <div style="flex:1"><div style="font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px">${t.nm} <span class="badge" style="background:${t.rat==="Alta"?"var(--okl)":"var(--wl)"};color:${t.rat==="Alta"?"var(--ok)":"var(--w)"}">${t.rat}</span></div>
        <div style="font-size:12px;color:var(--ts);margin-top:2px">${t.sum}</div></div>
        <span style="color:var(--tm)">›</span>
      </div>
      <div class="tbody" style="display:none;padding:0 18px 16px;border-top:1px solid var(--bl)">
        <div style="padding-top:14px"><h4 style="font-size:13px;font-weight:700;margin-bottom:10px">Pas a pas:</h4>
        ${t.steps.map((s,i)=>`<div style="display:flex;gap:10px;margin-bottom:6px"><div style="width:22px;height:22px;border-radius:6px;background:${t.bg};color:${t.col};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${i+1}</div><span style="font-size:12px;line-height:1.5;padding-top:2px">${s}</span></div>`).join("")}
        </div>
      </div>
    </div>`).join("")}
    <div class="c grad">
      <h3 style="font-size:15px;font-weight:800;margin-bottom:12px">🏆 Protocol Mestre: Ordre recomanat</h3>
      ${[{p:"Fase I",t:"Entorn: aïlla't, mòbil fora, Deep Work activat",i:"🔒"},
        {p:"Fase II",t:"Comprensió: Interrogació Elaborativa + Feynman",i:"💡"},
        {p:"Fase III",t:"Memorització: Recuperació Activa × 3 + SRS",i:"🧠"},
        {p:"Fase IV",t:"Transferència: Mode Caos intercalat",i:"⚡"},
        {p:"Fase V",t:"Recuperació: NSDR + 7-9h son + zero pantalles",i:"🌙"}
      ].map(p=>`<div style="display:flex;align-items:center;gap:12px;padding:9px 12px;background:rgba(255,255,255,.6);border-radius:9px;margin-bottom:6px">
        <div style="width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:16px">${p.i}</div>
        <div><span style="font-size:10px;font-weight:700;color:var(--a)">${p.p}</span><div style="font-size:12px;margin-top:1px">${p.t}</div></div>
      </div>`).join("")}
    </div>
  `);
}

// MAIN RENDER
// ═══════════════════════════════════════════
function render(){
  renderSidebar();
  if(tab==="dashboard")renderDashboard();
  else if(tab==="timer")renderTimer();
  else if(tab==="cards")renderCards();
  else if(tab==="feynman")renderFeynman();
  else if(tab==="chaos")renderChaos();
  else if(tab==="recovery")renderRecovery();
  else if(tab==="exams")renderExams();
  else if(tab==="techniques")renderTechniques();
}
render();
</script>
