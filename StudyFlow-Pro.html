<!DOCTYPE html>
<html lang="ca" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>StudyFlow Pro — La teva arma secreta acadèmica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM — PREMIUM VARIABLES
   ═══════════════════════════════════════════ */
:root {
  --bg: #f8f9fb; --s: #ffffff; --s2: #f1f3f8; --sh: #eef0f5; --b: #e2e5ed; --bl: #f0f2f7;
  --t: #0f172a; --ts: #64748b; --tm: #94a3b8; --tw: #cbd5e1;
  --a: #6366f1; --al: #eef2ff; --ad: #4f46e5; --a2: #818cf8;
  --ok: #10b981; --okl: #d1fae5; --okd: #059669;
  --w: #f59e0b; --wl: #fef3c7; --wd: #d97706;
  --err: #ef4444; --errl: #fee2e2; --errd: #dc2626;
  --p: #8b5cf6; --pl: #ede9fe; --pd: #7c3aed;
  --i: #06b6d4; --il: #cffafe; --id: #0891b2;
  --r: #f43f5e; --rl: #ffe4e6; --rd: #e11d48;
  --glow: rgba(99,102,241,.12);
  --glass: rgba(255,255,255,.72); --glass-b: rgba(255,255,255,.5);
  --radius: 16px; --radius-sm: 10px; --radius-xs: 7px;
  --shadow: 0 1px 3px rgba(15,23,42,.04), 0 4px 14px rgba(15,23,42,.06);
  --shadow-lg: 0 4px 25px rgba(15,23,42,.08), 0 12px 40px rgba(15,23,42,.04);
  --shadow-glow: 0 0 20px var(--glow), 0 4px 14px rgba(15,23,42,.06);
  --transition: .2s cubic-bezier(.4,0,.2,1);
  --transition-spring: .4s cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"] {
  --bg: #0b0f1a; --s: #151b2e; --s2: #1a2240; --sh: #1e2545; --b: #2a3155; --bl: #171e35;
  --t: #f1f5f9; --ts: #94a3b8; --tm: #64748b; --tw: #334155;
  --al: rgba(99,102,241,.15); --okl: rgba(16,185,129,.12); --wl: rgba(245,158,11,.12);
  --errl: rgba(239,68,68,.12); --pl: rgba(139,92,246,.12); --il: rgba(6,182,212,.12); --rl: rgba(244,63,94,.12);
  --glow: rgba(99,102,241,.2);
  --glass: rgba(21,27,46,.8); --glass-b: rgba(21,27,46,.6);
  --shadow: 0 1px 3px rgba(0,0,0,.2), 0 4px 14px rgba(0,0,0,.15);
  --shadow-lg: 0 4px 25px rgba(0,0,0,.25);
  --shadow-glow: 0 0 25px var(--glow);
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t);display:flex;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}

/* ═══════════════════════════════════════════
   SIDEBAR — GLASSMORPHISM
   ═══════════════════════════════════════════ */
.sb{width:240px;background:var(--s);border-right:1px solid var(--b);padding:20px 14px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;overflow-y:auto;transition:var(--transition)}
.sb-brand{padding:4px 12px 18px;border-bottom:1px solid var(--bl);margin-bottom:10px}
.sb-brand h1{font-size:20px;font-weight:900;letter-spacing:-.6px;background:linear-gradient(135deg,var(--a),var(--p),var(--r));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 200%;animation:gradShift 5s ease infinite}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.sb-brand p{font-size:11px;color:var(--tm);margin-top:3px;letter-spacing:.2px}
.nb{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);color:var(--ts);font-size:13px;font-weight:500;width:100%;text-align:left;transition:var(--transition);position:relative;overflow:hidden}
.nb:hover{background:var(--sh);color:var(--t)}
.nb.on{background:linear-gradient(135deg,var(--a),var(--ad));color:#fff;font-weight:600;box-shadow:0 2px 12px rgba(99,102,241,.3)}
.nb.on::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);pointer-events:none}
.nb svg{width:18px;height:18px;flex-shrink:0}
.nb .badge-dot{width:7px;height:7px;border-radius:50%;background:var(--r);margin-left:auto;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

.sb-ft{margin-top:auto;padding:16px 12px;border-top:1px solid var(--bl)}
.sb-ft .xp-bar{height:6px;background:var(--bl);border-radius:3px;overflow:hidden;margin:8px 0 6px}
.sb-ft .xp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--a),var(--p));transition:width .6s ease}
.sb-ft .row{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:3px}
.sb-ft .k{color:var(--tm)}.sb-ft .v{font-weight:700;color:var(--t)}
.sb-tools{display:flex;gap:5px;margin-top:10px}
.sb-tools button{flex:1;padding:7px;border-radius:var(--radius-xs);background:var(--sh);color:var(--ts);font-size:11px;font-weight:600;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:4px}
.sb-tools button:hover{background:var(--b);color:var(--t)}

/* ═══════════════════════════════════════════
   MAIN CONTENT
   ═══════════════════════════════════════════ */
.mn{flex:1;overflow-y:auto;padding:28px 32px;scroll-behavior:smooth}
.sec{display:none;flex-direction:column;gap:20px;max-width:960px;animation:fadeIn .3s ease}
.sec.on{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════
   CARDS — GLASSMORPHISM STYLE
   ═══════════════════════════════════════════ */
.c{background:var(--s);border-radius:var(--radius);border:1px solid var(--b);padding:24px;transition:var(--transition);position:relative;overflow:hidden}
.c:hover{box-shadow:var(--shadow);border-color:var(--tw)}
.c.glow:hover{box-shadow:var(--shadow-glow)}
.c.glass{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}

/* ═══════════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════════ */
.bp{background:linear-gradient(135deg,var(--a),var(--ad));color:#fff;border-radius:var(--radius-sm);padding:10px 20px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:8px;transition:var(--transition);box-shadow:0 2px 8px rgba(99,102,241,.25);position:relative;overflow:hidden}
.bp:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.35)}
.bp:active{transform:translateY(0);box-shadow:0 1px 4px rgba(99,102,241,.2)}
.bp::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);pointer-events:none}
.bs{background:var(--s);color:var(--ts);border:1px solid var(--b);border-radius:var(--radius-sm);padding:10px 20px;font-weight:500;font-size:13px;display:inline-flex;align-items:center;gap:8px;transition:var(--transition)}
.bs:hover{background:var(--sh);color:var(--t);border-color:var(--tw)}
.bi{color:var(--tm);padding:7px;border-radius:var(--radius-xs);transition:var(--transition)}
.bi:hover{background:var(--sh);color:var(--t)}
.bdanger{background:var(--errl);color:var(--err);border-radius:var(--radius-sm);padding:10px 20px;font-weight:600;font-size:13px;transition:var(--transition)}
.bdanger:hover{background:var(--err);color:#fff}

/* ═══════════════════════════════════════════
   INPUTS
   ═══════════════════════════════════════════ */
.inp{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--b);font-size:13px;color:var(--t);background:var(--bg);transition:var(--transition)}
.inp:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--al)}
.inp::placeholder{color:var(--tm)}
textarea.inp{resize:vertical;min-height:80px}
.lbl{font-size:11px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}

/* ═══════════════════════════════════════════
   GRIDS
   ═══════════════════════════════════════════ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* ═══════════════════════════════════════════
   STAT CARDS
   ═══════════════════════════════════════════ */
.sc{display:flex;flex-direction:column;gap:10px;padding:20px}
.sc .top{display:flex;align-items:center;justify-content:space-between}
.sc .top span{font-size:12px;color:var(--ts);font-weight:500}
.sc .ib{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:17px}
.sc .val{font-size:24px;font-weight:900;letter-spacing:-.5px}
.sc .sub{font-size:11px;color:var(--tm)}
.sc .trend{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}

/* ═══════════════════════════════════════════
   BADGES & TAGS
   ═══════════════════════════════════════════ */
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;letter-spacing:.3px}
.tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-xs);display:inline-block}

/* ═══════════════════════════════════════════
   TASK ITEMS
   ═══════════════════════════════════════════ */
.ti{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);background:var(--bg);border:1px solid transparent}
.ti:hover{background:var(--sh);border-color:var(--b)}
.ti.done{background:var(--okl);border-color:rgba(16,185,129,.15);opacity:.6}
.ti .info{flex:1;min-width:0}.ti .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti.done .nm{text-decoration:line-through}
.ti .ds{font-size:11px;color:var(--ts);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti .tg{font-size:10px;color:var(--tm);white-space:nowrap;font-weight:600}

/* ═══════════════════════════════════════════
   TIMER
   ═══════════════════════════════════════════ */
.tmr-circle{position:relative;width:240px;height:240px;margin:20px auto}
.tmr-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.tmr-time .dig{font-size:52px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-3px;background:linear-gradient(180deg,var(--t),var(--ts));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tmr-time .sub{font-size:12px;color:var(--tm);margin-top:4px}

/* ═══════════════════════════════════════════
   FLASHCARD
   ═══════════════════════════════════════════ */
.fc{min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px;text-align:center;cursor:pointer;user-select:none;transition:var(--transition-spring);border:2px solid var(--b)}
.fc:hover{transform:scale(1.005);box-shadow:var(--shadow-lg)}
.fc .q{font-size:20px;font-weight:700;line-height:1.5}
.fc .a{font-size:17px;color:var(--ok);font-weight:600;margin-top:14px;line-height:1.5;animation:fadeIn .3s}
.fc .hint{font-size:12px;color:var(--tm);margin-top:18px}

/* ═══════════════════════════════════════════
   FEYNMAN CHAT
   ═══════════════════════════════════════════ */
.chat-area{max-height:380px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:12px 0}
.msg{max-width:78%;padding:13px 18px;border-radius:18px;font-size:13px;line-height:1.65;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--a),var(--ad));color:#fff;border-bottom-right-radius:5px}
.msg.ai{align-self:flex-start;background:var(--sh);color:var(--t);border-bottom-left-radius:5px}
.chat-input{display:flex;gap:8px;margin-top:12px}
.chat-input input{flex:1}

/* ═══════════════════════════════════════════
   BREATHING
   ═══════════════════════════════════════════ */
.breath-circle{width:170px;height:170px;border-radius:50%;background:linear-gradient(135deg,var(--al),var(--pl));display:flex;align-items:center;justify-content:center;margin:20px auto;font-size:15px;font-weight:700;color:var(--a);transition:transform 4s cubic-bezier(.4,0,.2,1);box-shadow:0 0 40px var(--glow)}
.breath-circle.inhale{transform:scale(1.45)}
.breath-circle.exhale{transform:scale(1)}

/* ═══════════════════════════════════════════
   PROGRESS BARS
   ═══════════════════════════════════════════ */
.pb{height:6px;background:var(--bl);border-radius:3px;overflow:hidden}
.pb .fill{height:100%;border-radius:3px;transition:width .6s ease}
.pb-lg{height:10px}

/* ═══════════════════════════════════════════
   HEATMAP
   ═══════════════════════════════════════════ */
.heatmap{display:flex;gap:3px;flex-wrap:wrap}
.hm-cell{width:13px;height:13px;border-radius:3px;background:var(--bl);transition:var(--transition)}
.hm-cell:hover{transform:scale(1.3);box-shadow:var(--shadow)}
.hm-cell[data-lvl="1"]{background:var(--al)}
.hm-cell[data-lvl="2"]{background:var(--a2)}
.hm-cell[data-lvl="3"]{background:var(--a)}
.hm-cell[data-lvl="4"]{background:var(--ad)}

/* ═══════════════════════════════════════════
   ACHIEVEMENTS
   ═══════════════════════════════════════════ */
.ach{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--radius-sm);background:var(--bg);border:1px solid var(--bl);transition:var(--transition)}
.ach.unlocked{background:linear-gradient(135deg,var(--wl),var(--pl));border-color:rgba(245,158,11,.2)}
.ach .ach-ico{width:42px;height:42px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--s);box-shadow:var(--shadow)}
.ach.locked .ach-ico{filter:grayscale(1);opacity:.4}
.ach .ach-info{flex:1}.ach .ach-name{font-size:13px;font-weight:700}.ach .ach-desc{font-size:11px;color:var(--ts);margin-top:2px}
.ach.locked .ach-name,.ach.locked .ach-desc{opacity:.5}

/* ═══════════════════════════════════════════
   SOUND MIXER
   ═══════════════════════════════════════════ */
.snd-ch{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius-sm);background:var(--bg)}
.snd-ch .snd-ico{width:36px;height:36px;border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--al)}
.snd-ch .snd-name{font-size:12px;font-weight:600;min-width:60px}
.snd-ch input[type="range"]{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--bl);outline:none}
.snd-ch input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--a);cursor:pointer;box-shadow:0 1px 4px rgba(99,102,241,.4)}

/* ═══════════════════════════════════════════
   MODE CARDS
   ═══════════════════════════════════════════ */
.mc{text-align:left;padding:18px;cursor:pointer;border:2px solid var(--b);transition:var(--transition);border-radius:var(--radius)}
.mc:hover{border-color:var(--tw);box-shadow:var(--shadow)}
.mc.on{border-color:var(--a);background:var(--al);box-shadow:var(--shadow-glow)}
.mc .mn-name{font-size:14px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.mc.on .mn-name{color:var(--a)}
.mc .mn-desc{font-size:11px;color:var(--ts);line-height:1.5}

/* ═══════════════════════════════════════════
   CHAOS MODE
   ═══════════════════════════════════════════ */
.chaos-problem{background:var(--bg);border:2px solid var(--b);border-radius:var(--radius);padding:28px;text-align:center;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:var(--transition)}
.chaos-problem:hover{box-shadow:var(--shadow)}

/* ═══════════════════════════════════════════
   SPECIAL CARDS
   ═══════════════════════════════════════════ */
.zeig{background:linear-gradient(135deg,var(--wl),var(--rl));border:none;position:relative}
.zeig::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--w);border-radius:var(--radius) 0 0 var(--radius)}
.grad{background:linear-gradient(135deg,var(--al),var(--pl));border:none}
.grad2{background:linear-gradient(135deg,var(--okl),var(--il));border:none}
.empty{text-align:center;padding:48px;color:var(--tm)}
.empty p{font-size:13px;margin-top:8px;line-height:1.5}

/* LEVEL-UP ANIMATION */
@keyframes levelUp{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
.level-up-anim{animation:levelUp .5s var(--transition-spring)}

/* SECTION HEADERS */
.sec-hdr{margin-bottom:6px}
.sec-hdr h2{font-size:20px;font-weight:900;letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
.sec-hdr p{font-size:12px;color:var(--ts);margin-top:4px;line-height:1.5}

/* ═══════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════ */
@media(max-width:768px){
  body{flex-direction:column}
  .sb{width:100%;flex-direction:row;padding:8px 10px;overflow-x:auto;gap:3px;border-right:none;border-bottom:1px solid var(--b)}
  .sb-brand,.sb-ft{display:none}
  .nb{white-space:nowrap;padding:8px 12px;font-size:11px;border-radius:20px}
  .nb span:not(.badge-dot){display:none}
  .nb svg{width:16px;height:16px}
  .mn{padding:16px}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .tmr-circle{width:200px;height:200px}
  .tmr-time .dig{font-size:44px}
}
@media(max-width:480px){
  .mn{padding:12px}
  .c{padding:18px;border-radius:var(--radius-sm)}
}

/* ═══════════════════════════════════════════
   NOTIFICATION TOAST
   ═══════════════════════════════════════════ */
.toast{position:fixed;top:24px;right:24px;background:var(--s);border:1px solid var(--b);border-radius:var(--radius);padding:16px 22px;box-shadow:var(--shadow-lg);z-index:9999;display:flex;align-items:center;gap:12px;animation:toastIn .4s var(--transition-spring);max-width:360px}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.toast.out{animation:toastOut .3s ease forwards}
@keyframes toastOut{to{opacity:0;transform:translateX(40px)}}
.toast .t-ico{font-size:22px}
.toast .t-body{flex:1}.toast .t-title{font-size:13px;font-weight:700}.toast .t-desc{font-size:11px;color:var(--ts);margin-top:2px}

/* XP POPUP */
.xp-pop{position:fixed;pointer-events:none;font-size:18px;font-weight:900;color:var(--a);z-index:9998;animation:xpFloat 1.2s ease forwards}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sb" id="sidebar">
  <div class="sb-brand"><h1>StudyFlow Pro</h1><p>Ciència del rendiment acadèmic</p></div>
  <button class="nb on" data-tab="dashboard" onclick="go('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Dashboard</span>
  </button>
  <button class="nb" data-tab="timer" onclick="go('timer')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>Timer</span>
  </button>
  <button class="nb" data-tab="cards" onclick="go('cards')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>Flashcards</span>

<script>
// ═══════════════════════════════════════════
// STATE & PERSISTENCE
// ═══════════════════════════════════════════
const KEY="sfpro";
const defaults={
  todaySess:0,totalMin:0,streak:1,lastDate:null,pomCount:0,
  weekly:[{d:"Dl",m:0},{d:"Dt",m:0},{d:"Dc",m:0},{d:"Dj",m:0},{d:"Dv",m:0},{d:"Ds",m:0},{d:"Dg",m:0}],
  exams:[],decks:[],doneTasks:[],chaosProblems:[],zNote:"",
  feynmanHistory:[],memStrength:0,quizTotal:0,quizCorrect:0,cardsToday:0,
  // GAMIFICATION
  xp:0,level:1,totalXp:0,achievements:[],
  // HEATMAP (last 90 days: {date:minutes})
  heatmap:{},
  // LANGUAGES
  langDecks:[], // [{id,name,lang,cards:[{id,word,translation,example,hits,interval,nextReview}]}]
  // SOUND MIXER prefs
  soundPrefs:{rain:0,cafe:0,fire:0,forest:0,waves:0,brown:0},
  // DAILY LOG for stats
  dailyLog:[], // [{date,minutes,cards,correct,sessions}]
};
let S;
try{const r=localStorage.getItem(KEY);S=r?{...defaults,...JSON.parse(r)}:{...defaults}}catch(e){S={...defaults}}
// Ensure all keys exist
Object.keys(defaults).forEach(k=>{if(S[k]===undefined)S[k]=defaults[k]});

const today=()=>new Date().toISOString().split("T")[0];
if(S.lastDate&&S.lastDate!==today()){
  const d=Math.floor((new Date(today())-new Date(S.lastDate))/864e5);
  if(d===1&&S.todaySess>0)S.streak++;else if(d>1)S.streak=1;
  S.todaySess=0;S.cardsToday=0;
  const dow=new Date().getDay();
  if(dow===1&&d>=1)S.weekly=defaults.weekly.map(w=>({...w}));
}
function save(){
  S.lastDate=today();
  // Update heatmap
  S.heatmap[today()]=(S.heatmap[today()]||0);
  // Clean old heatmap entries (keep 120 days)
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-120);
  const cs=cutoff.toISOString().split("T")[0];
  Object.keys(S.heatmap).forEach(k=>{if(k<cs)delete S.heatmap[k]});
  localStorage.setItem(KEY,JSON.stringify(S));
}

// ═══════════════════════════════════════════
// GAMIFICATION ENGINE
// ═══════════════════════════════════════════
const XP_TABLE=[0,100,220,360,520,700,900,1120,1360,1620,1900,2200,2520,2860,3220,3600,4000,4420,4860,5320,5800,6300,6820,7360,7920,8500,9100,9720,10360,11020,11700,12400,13120,13860,14620,15400,16200,17020,17860,18720,19600,20500,21420,22360,23320,24300,25300,26320,27360,28420,30000];

function addXP(amount,reason){
  S.xp+=amount;S.totalXp+=amount;
  // Level up check
  while(S.level<50&&S.totalXp>=XP_TABLE[S.level]){
    S.level++;
    showToast(`🎉 Nivell ${S.level}!`,`Has pujat de nivell! Continua així.`,"level");
  }
  save();
  // Show XP popup
  showXPPopup(`+${amount} XP`);
  // Check achievements
  checkAchievements();
  renderSidebar();
}

const ACHIEVEMENTS=[

  {id:"mem_80",name:"Memòria d'Acer",desc:"Arriba al 80% de força de memòria",ico:"💎",check:()=>S.memStrength>=80},
  {id:"hours_10",name:"Dedicat",desc:"Acumula 10 hores d'estudi",ico:"⏰",check:()=>S.totalMin>=600},
  {id:"hours_50",name:"Mestre",desc:"Acumula 50 hores d'estudi",ico:"🏆",check:()=>S.totalMin>=3000},
  {id:"hours_100",name:"Acadèmic d'Elit",desc:"100 hores d'estudi total",ico:"🎓",check:()=>S.totalMin>=6000},
  {id:"chaos_10",name:"Gladiador",desc:"Completa 10 rondes de Mode Caos",ico:"⚔️",check:()=>(S.chaosProblems.length>=3&&S.quizTotal>=10)},
  {id:"level_10",name:"Veterà",desc:"Arriba al nivell 10",ico:"⭐",check:()=>S.level>=10},
  {id:"level_25",name:"Expert",desc:"Arriba al nivell 25",ico:"💫",check:()=>S.level>=25},
  {id:"level_50",name:"Gran Mestre",desc:"Arriba al nivell 50",ico:"🌟",check:()=>S.level>=50},
  {id:"deep_work",name:"Deep Worker",desc:"Completa una sessió de 90+ min",ico:"🔮",check:()=>S.pomCount>0},
  {id:"pom_10",name:"Pomodoro Master",desc:"Completa 10 pomodoros",ico:"🍅",check:()=>S.pomCount>=10},
];

function checkAchievements(){
  ACHIEVEMENTS.forEach(a=>{
    if(!S.achievements.includes(a.id)&&a.check()){
      S.achievements.push(a.id);
      showToast(`${a.ico} ${a.name}`,a.desc,"achievement");
      addXP(50,"Assoliment desbloquejat");
    }
  });
  save();
}

// TOASTS & POPUPS

function showToast(title,desc,type){
  const ico=type==="level"?"🎉":type==="achievement"?"🏅":"ℹ️";
  const el=document.createElement("div");el.className="toast";
  el.innerHTML=`<div class="t-ico">${ico}</div><div class="t-body"><div class="t-title">${title}</div><div class="t-desc">${desc}</div></div>`;

}
function showXPPopup(text){

  el.style.left=Math.random()*60+20+"%";el.style.top=Math.random()*30+10+"%";

function importData(ev){

  const r=new FileReader();r.onload=function(e){
    try{S={...defaults,...JSON.parse(e.target.result)};save();render();showToast("✅ Importat","Dades carregades correctament");}catch(err){showToast("❌ Error","Fitxer no vàlid")}
  };r.readAsText(f);ev.target.value="";

// ═══════════════════════════════════════════
// NOTIFICATION SOUND
// ═══════════════════════════════════════════
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const freqs=type==="done"?[523.25,659.25,783.99]:[392,330,262];
    freqs.forEach((freq,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.type="sine";osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.25,ctx.currentTime+i*0.15);
      gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+i*0.15+0.35);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(ctx.currentTime+i*0.15);osc.stop(ctx.currentTime+i*0.15+0.35);
    });
  }catch(e){}
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function fmtTime(s){return`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`}
function fmtDate(d){const dt=new Date(d+"T12:00:00"),ds=["Dg","Dl","Dt","Dc","Dj","Dv","Ds"],ms=["gen","feb","mar","abr","mai","jun","jul","ago","set","oct","nov","des"];return`${ds[dt.getDay()]} ${dt.getDate()} ${ms[dt.getMonth()]}`}
function daysUntil(d){const n=new Date();n.setHours(0,0,0,0);const t=new Date(d+"T12:00:00");t.setHours(0,0,0,0);return Math.ceil((t-n)/864e5)}
function uid(){return Date.now()+Math.random().toString(36).substr(2,5)}
function $(id){return document.getElementById(id)}
function html(id,h){const el=$(id);if(el)el.innerHTML=h}
function xpForLevel(l){return l<50?(XP_TABLE[l]||30000)-(XP_TABLE[l-1]||0):1000}
function xpInLevel(){const prev=XP_TABLE[S.level-1]||0;const next=XP_TABLE[S.level]||prev+1000;return{cur:S.totalXp-prev,need:next-prev}}

// ═══════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════
const MODES=[
  {id:"pom",nm:"Pomodoro",w:25*60,r:5*60,lr:15*60,ico:"⏱️",ds:"25/5 min",ideal:"Flashcards, repàs, vocabulari"},
  {id:"d52",nm:"Ultradian",w:52*60,r:17*60,ico:"🧠",ds:"52/17 min",ideal:"Estudi mixt, lectura activa"},
  {id:"d90",nm:"Deep Work",w:90*60,r:27*60,ico:"⚡",ds:"90/27 min",ideal:"Mates, física, programació"},
  // {id:"d120",nm:"Lock-in Total",w:120*60,r:36*60,ico:"🔥",ds:"120/36 min",ideal:"Immersió total, projectes"},
];
let tmMode=0,tmLeft=MODES[0].w,tmRun=false,tmRest=false,tmInt=null;
function tmStart(){
  if(tmRun)return;tmRun=true;
  tmInt=setInterval(()=>{
    tmLeft--;
    if(tmLeft<=0){
      clearInterval(tmInt);tmRun=false;playSound("done");
      if(!tmRest){
        const mins=Math.round(MODES[tmMode].w/60);
        S.totalMin+=mins;S.todaySess++;S.pomCount++;
        S.heatmap[today()]=(S.heatmap[today()]||0)+mins;
        const di=new Date().getDay(),mi=di===0?6:di-1;
        S.weekly[mi].m+=mins;
        // Daily log
        let dl=S.dailyLog.find(d=>d.date===today());
        if(!dl){dl={date:today(),minutes:0,cards:0,correct:0,sessions:0};S.dailyLog.push(dl)}
        dl.minutes+=mins;dl.sessions++;
        save();
        addXP(mins*2,"Sessió completada");
        tmRest=true;
        tmLeft=MODES[tmMode].id==="pom"&&S.pomCount%4===0?(MODES[tmMode].lr||MODES[tmMode].r):MODES[tmMode].r;
      }else{tmRest=false;tmLeft=MODES[tmMode].w}
      renderTimer();
    }
    updateTimerDisplay();
  },1000);renderTimer();
}
function tmPause(){tmRun=false;clearInterval(tmInt);renderTimer()}
function tmReset(){tmRun=false;tmRest=false;clearInterval(tmInt);tmLeft=MODES[tmMode].w;renderTimer()}
function tmSetMode(i){tmMode=i;tmRun=false;tmRest=false;clearInterval(tmInt);tmLeft=MODES[i].w;renderTimer()}
function updateTimerDisplay(){
  const d=$("tm-dig");if(d)d.textContent=fmtTime(tmLeft);
  const m=MODES[tmMode],tot=tmRest?m.r:m.w,pct=((tot-tmLeft)/tot)*100;
  const c=$("tm-circ");if(c){const r=106,cr=2*Math.PI*r;c.style.strokeDashoffset=`${cr*(1-pct/100)}`}
}

// ═══════════════════════════════════════════
// FLASHCARDS — Regla del 3 + SRS
// ═══════════════════════════════════════════
let curDeck=null,curCard=null,showAns=false;
function addDeck(name){if(!name)return;S.decks.push({id:uid(),name,cards:[]});save();renderCards()}
function addCard(deckId,q,a,subject){
  const dk=S.decks.find(d=>d.id===deckId);if(!dk||!q||!a)return;
  dk.cards.push({id:uid(),q,a,subject:subject||"General",hits:0,sessionHits:0,nextReview:today(),strength:0,interval:1,lastSeen:null});
  save();renderCards();
}
function deleteDeck(id){S.decks=S.decks.filter(d=>d.id!==id);if(curDeck===id)curDeck=null;save();renderCards()}
function deleteCard(deckId,cardId){const dk=S.decks.find(d=>d.id===deckId);if(dk)dk.cards=dk.cards.filter(c=>c.id!==cardId);save();renderCards()}
function getDueCards(deckId){const dk=S.decks.find(d=>d.id===deckId);if(!dk)return[];return dk.cards.filter(c=>!c.nextReview||c.nextReview<=today())}
function startReview(deckId){
  curDeck=deckId;const due=getDueCards(deckId);
  if(due.length===0){curCard=null;renderCards();return}
  due.forEach(c=>c.sessionHits=0);curCard=due[0];showAns=false;renderCards();
}
function revealAnswer(){showAns=true;renderCards()}
function gradeCard(correct){
  if(!curCard||!curDeck)return;
  const dk=S.decks.find(d=>d.id===curDeck),card=dk.cards.find(c=>c.id===curCard.id);if(!card)return;
  S.quizTotal++;
  if(correct){
    S.quizCorrect++;card.sessionHits=(card.sessionHits||0)+1;card.hits++;
    if(card.sessionHits>=3){
      card.strength=Math.min(100,card.strength+15);
      card.interval=Math.min(90,Math.round(card.interval*2.2));
      const next=new Date();next.setDate(next.getDate()+card.interval);
      card.nextReview=next.toISOString().split("T")[0];card.lastSeen=today();
    }
    addXP(5,"Flashcard correcta");
  }else{card.sessionHits=0;card.strength=Math.max(0,card.strength-10);card.interval=1;card.nextReview=today()}
  S.cardsToday++;S.memStrength=S.quizTotal>0?Math.round((S.quizCorrect/S.quizTotal)*100):0;
  // Daily log
  let dl=S.dailyLog.find(d=>d.date===today());
  if(!dl){dl={date:today(),minutes:0,cards:0,correct:0,sessions:0};S.dailyLog.push(dl)}
  dl.cards++;if(correct)dl.correct++;
  save();
  const due=getDueCards(curDeck).filter(c=>c.sessionHits<3);
  if(due.length>0){due.sort((a,b)=>(a.sessionHits||0)-(b.sessionHits||0));curCard=due[0];showAns=false}
  else{curCard=null;curDeck=null;showToast("🎉 Sessió completa!","Tots els conceptes revisats")}
  renderCards();
}

// ═══════════════════════════════════════════
// FEYNMAN TUTOR — MILLORAT
// ═══════════════════════════════════════════
let feynTopic="",feynMessages=[],feynLevel=0;
const JARGON_PATTERNS=["paradigma","axiomàtic","epistemològic","ontològic","heurístic","sinàptic","neurocognitiu","metacogni","algorítmic","exponencial","logarítmic","derivada parcial","integral definida","isomorfisme","homeomorfisme","estequiometria","termodinàmic","entropia","catalitzador","polímers","electròfil","nucleòfil","cinètic","estocàstic","asimptòtic","convergent","divergent","vectorial","escalar","tensorial","ortogonal","hermitià","hamiltonià"];

function startFeynman(topic){
  if(!topic.trim())return;
  feynTopic=topic;feynLevel=0;
  feynMessages=[{role:"ai",text:`D'acord! Seré un nen de 5 anys molt curiós 🧒\n\nExplica'm: <strong>"${topic}"</strong>\n\nQuè és això? Necessito que ho expliquis tan fàcil que ho entengui qualsevol persona del carrer. Res de paraules complicades!`}];
  renderFeynman();addXP(5,"Feynman iniciat");
}
function sendFeynman(userText){
  if(!userText.trim())return;
  feynMessages.push({role:"user",text:userText});
  const lower=userText.toLowerCase();
  const usesJargon=JARGON_PATTERNS.some(j=>lower.includes(j));
  const tooShort=userText.split(/\s+/).length<12;
  const hasAnalogy=lower.includes("com si")||lower.includes("imagina")||lower.includes("per exemple")||lower.includes("és com")||lower.includes("seria com");
  const hasSteps=lower.includes("primer")||lower.includes("després")||lower.includes("finalment")||lower.includes("pas ");
  const hasWhy=lower.includes("perquè")||lower.includes("per què")||lower.includes("la raó")||lower.includes("causa");
  let aiResp="";let xpGain=0;

  if(usesJargon){
    const jFound=JARGON_PATTERNS.find(j=>lower.includes(j));
    aiResp=`⚠️ <strong>ALERTA: Il·lusió de competència detectada!</strong>\n\nHas usat "<em>${jFound}</em>" — això és jerga tècnica. Usar paraules difícils no és el mateix que entendre-les.\n\n🎯 <strong>Repte:</strong> Explica el MATEIX concepte però imagina que ho expliques a la teva àvia. Usa una analogia de la vida quotidiana.\n\n<em>Tip: Les millors explicacions usen exemples com "és com quan..."</em>`;
    feynLevel=Math.max(0,feynLevel-1);
  }else if(tooShort){
    aiResp=`Mmm, necessito més! 🤔\n\n<strong>La teva explicació és massa curta.</strong> Un concepte complex necessita:\n\n• <strong>Context:</strong> Per què existeix això?\n• <strong>Mecanisme:</strong> Com funciona pas a pas?\n• <strong>Exemple:</strong> On ho veiem a la vida real?\n\nProva de nou amb més detall!`;
  }else if(!hasAnalogy&&feynLevel<2){
    const prompts=[

    ];

  }else if(!hasWhy&&Math.random()<0.45){
    const whys=[
      `Interessant! Però... <strong>¿PER QUÈ</strong> passa això? Quina és la causa de fons? 🔍`,

      `D'acord! Però... <strong>¿com connectes això amb ${feynTopic.split(" ")[0]}?</strong> Fes el pont! 🌉`,
    ];
    aiResp=whys[Math.floor(Math.random()*whys.length)];feynLevel++;xpGain=5;
  }else{
    const bonus=hasAnalogy&&hasSteps?"Has usat analogia I estructura pas a pas — IMPECABLE.":hasAnalogy?"L'analogia ha estat clau — facilita la comprensió.":"Explicació clara i directa.";
    const praises=[
      `🎉 <strong>EXCEL·LENT!</strong> Ara sí que ho entenc!\n\n${bonus}\n\n✅ <strong>Feynman aprovat!</strong> Nivell de comprensió: <strong style="color:var(--ok)">ALT</strong>\n\nAquest concepte és teu. Vols provar amb un altre?`,
      `🌟 <strong>PERFECTE!</strong> L'has explicat genial.\n\nAixò és exactament el que Feynman demanava: si no ho pots explicar simple, no ho entens. Tu SÍ ho entens!\n\n✅ <strong>Tema dominat!</strong> +15 XP`,

    ];
    aiResp=praises[Math.floor(Math.random()*praises.length)];feynLevel=3;xpGain=15;
  }

  feynMessages.push({role:"ai",text:aiResp});
  if(xpGain>0)addXP(xpGain,"Feynman progress");
  renderFeynman();
}

function addLangCard(deckId,word,translation,example){

function startLangReview(deckId){
  curLangDeck=deckId;
  const dk=S.langDecks.find(d=>d.id===deckId);if(!dk)return;
  const due=dk.cards.filter(c=>!c.nextReview||c.nextReview<=today());
  if(due.length===0){curLangCard=null;showToast("✅ Tot al dia!","No hi ha paraules pendents");renderLanguages();return}
  due.forEach(c=>c.sessionHits=0);curLangCard=due[0];showLangAns=false;renderLanguages();
}
function gradeLangCard(correct){
  if(!curLangCard||!curLangDeck)return;
  const dk=S.langDecks.find(d=>d.id===curLangDeck),card=dk.cards.find(c=>c.id===curLangCard.id);
  if(!card)return;
  if(correct){
    card.sessionHits++;card.hits++;card.strength=Math.min(100,card.strength+12);
    if(card.sessionHits>=3){card.interval=Math.min(60,Math.round(card.interval*2));const n=new Date();n.setDate(n.getDate()+card.interval);card.nextReview=n.toISOString().split("T")[0]}
    addXP(3,"Paraula correcta");
  }else{card.sessionHits=0;card.strength=Math.max(0,card.strength-8);card.interval=1;card.nextReview=today()}
  S.cardsToday++;save();
  const due=dk.cards.filter(c=>(!c.nextReview||c.nextReview<=today())&&c.sessionHits<3);
  if(due.length>0){due.sort((a,b)=>(a.sessionHits||0)-(b.sessionHits||0));curLangCard=due[0];showLangAns=false}
  else{curLangCard=null;curLangDeck=null;showToast("🎉 Sessió d'idiomes completa!","")}
  renderLanguages();
}

// SOUND MIXER (Web Audio API)
// ═══════════════════════════════════════════
let audioCtx=null,soundNodes={};
const SOUNDS={
  rain:{name:"Pluja",ico:"🌧️",type:"rain"},
  cafe:{name:"Cafeteria",ico:"☕",type:"cafe"},
  fire:{name:"Foc",ico:"🔥",type:"fire"},
  forest:{name:"Bosc",ico:"🌲",type:"forest"},
  waves:{name:"Ones",ico:"🌊",type:"waves"},
  brown:{name:"Soroll marró",ico:"🟤",type:"brown"},
};

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function createNoise(type){
  initAudio();
  const bufferSize=2*audioCtx.sampleRate;
  const buffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
  const data=buffer.getChannelData(0);
  if(type==="brown"){let last=0;for(let i=0;i<bufferSize;i++){const w=Math.random()*2-1;last=(last+0.02*w)/1.02;data[i]=last*3.5}}
  else if(type==="rain"){for(let i=0;i<bufferSize;i++){data[i]=(Math.random()*2-1)*0.5;if(Math.random()<0.001)data[i]*=4}}
  else if(type==="fire"){let last=0;for(let i=0;i<bufferSize;i++){const w=Math.random()*2-1;last=(last+0.04*w)/1.04;data[i]=last*2;if(Math.random()<0.005)data[i]*=3}}
  else if(type==="cafe"){for(let i=0;i<bufferSize;i++){data[i]=(Math.random()*2-1)*0.3;if(Math.random()<0.002)data[i]*=5}}
  else if(type==="waves"){for(let i=0;i<bufferSize;i++){const t=i/audioCtx.sampleRate;data[i]=Math.sin(t*0.1)*0.3*(Math.random()*2-1)+(Math.random()*2-1)*0.1}}
  else if(type==="forest"){for(let i=0;i<bufferSize;i++){data[i]=(Math.random()*2-1)*0.15;if(Math.random()<0.0005)data[i]=Math.sin(i/100)*0.8}}
  const src=audioCtx.createBufferSource();src.buffer=buffer;src.loop=true;
  const gain=audioCtx.createGain();gain.gain.value=0;
  src.connect(gain);gain.connect(audioCtx.destination);src.start();
  return{src,gain};
}
function setSoundVolume(type,vol){
  S.soundPrefs[type]=vol;save();
  if(vol>0){
    if(!soundNodes[type])soundNodes[type]=createNoise(type);
    soundNodes[type].gain.gain.linearRampToValueAtTime(vol/100,audioCtx.currentTime+0.1);
  }else if(soundNodes[type]){
    soundNodes[type].gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.1);
  }
}

function genStudyTasks(){
  const tasks=[],td=today();

    if(daysUntil(ex.date)<0)return;
    const iv=ex.difficulty==="difícil"?[0,1,2,4,7,14]:ex.difficulty==="mitjà"?[0,1,3,7,14]:[0,2,5,12];
    iv.forEach(i=>{
      const sd=new Date(ex.date+"T12:00:00");sd.setDate(sd.getDate()-i);

        tasks.push({id:`${ex.id}-${i}`,examName:ex.name,subject:ex.subject,date:ss,session,daysBefore:i});
      }
    });
  });return tasks.sort((a,b)=>a.date.localeCompare(b.date));
}

// RENDER — STATS
// ═══════════════════════════════════════════
function renderStats(){
  const last7=S.dailyLog.filter(d=>{const diff=(new Date(today())-new Date(d.date))/864e5;return diff<7});
  const totalMins7=last7.reduce((s,d)=>s+d.minutes,0);
  const totalCards7=last7.reduce((s,d)=>s+d.cards,0);
  const totalCorrect7=last7.reduce((s,d)=>s+d.correct,0);
  const avgMin7=last7.length>0?Math.round(totalMins7/7):0;

  html("sec-stats",`
    <div class="sec-hdr"><h2>📊 Estadístiques Avançades</h2><p>Dades reals del teu rendiment acadèmic</p></div>

    <div class="g4">
      ${[{l:"Últims 7 dies",v:totalMins7+"m",sub:"temps total",c:"var(--a)"},
        {l:"Mitjana diària",v:avgMin7+"m",sub:"objectiu: 120m",c:"var(--p)"},
        {l:"Cards 7d",v:totalCards7,sub:`${totalCorrect7} correctes`,c:"var(--i)"},
        {l:"Precisió 7d",v:totalCards7>0?Math.round(totalCorrect7/totalCards7*100)+"%":"--",sub:"objectiu: 85%",c:"var(--ok)"}
      ].map(s=>`<div class="c sc"><div class="top"><span>${s.l}</span></div><div class="val" style="color:${s.c}">${s.v}</div><div class="sub">${s.sub}</div></div>`).join("")}
    </div>

    <!-- ACHIEVEMENTS -->
    <div class="c">
      <h3 style="font-size:15px;font-weight:800;margin-bottom:14px">🏅 Assoliments (${S.achievements.length}/${ACHIEVEMENTS.length})</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${ACHIEVEMENTS.map(a=>{const u=S.achievements.includes(a.id);
        return`<div class="ach ${u?"unlocked":"locked"}">
          <div class="ach-ico">${a.ico}</div>
          <div class="ach-info"><div class="ach-name">${u?a.name:"???"}</div><div class="ach-desc">${a.desc}</div></div>
          ${u?'<span class="badge" style="background:var(--okl);color:var(--ok)">✓</span>':""}
        </div>`}).join("")}
      </div>
    </div>

    <!-- GLOBAL STATS -->
    <div class="c">
      <h3 style="font-size:15px;font-weight:800;margin-bottom:14px">📈 Estadístiques globals</h3>
      <div class="g2">
        ${[{l:"Total hores",v:(S.totalMin/60).toFixed(1)+"h"},{l:"Total sessions",v:S.pomCount},{l:"Ratxa màxima",v:S.streak+"d"},{l:"XP Total",v:S.totalXp},
          {l:"Total flashcards",v:S.quizTotal},{l:"Precisió global",v:S.quizTotal>0?Math.round(S.quizCorrect/S.quizTotal*100)+"%":"--"},
          {l:"Decks creats",v:S.decks.length+S.langDecks.length},{l:"Nivell",v:S.level}
        ].map(s=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bl)"><span style="color:var(--ts);font-size:13px">${s.l}</span><span style="font-weight:700;font-size:13px">${s.v}</span></div>`).join("")}
      </div>
    </div>
  `);
}
