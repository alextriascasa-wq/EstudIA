<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="gradSecondary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Llibre abstracte (base) -->
  <path d="M256 380 C 150 380 100 320 80 280 C 80 280 150 350 256 350 C 362 350 432 280 432 280 C 412 320 362 380 256 380 Z" fill="url(#gradSecondary)" opacity="0.8"/>
  <path d="M256 420 C 120 420 60 350 40 300 C 40 300 120 390 256 390 C 392 390 472 300 472 300 C 452 350 392 420 256 420 Z" fill="url(#gradPrimary)" filter="url(#glow)"/>

  <!-- Cervell / Espurna IA (centre) -->
  <path d="M256 120 C 180 120 140 180 140 240 C 140 290 180 320 256 340 C 332 320 372 290 372 240 C 372 180 332 120 256 120 Z" fill="none" stroke="url(#gradPrimary)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Línies neuronals -->
  <path d="M256 120 V 340 M190 170 C 220 200 256 200 256 200 M322 170 C 292 200 256 200 256 200 M170 240 H 256 M342 240 H 256 M190 300 C 220 270 256 270 256 270 M322 300 C 292 270 256 270 256 270" stroke="url(#gradSecondary)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Estrelles d'IA -->
  <path d="M380 100 L 390 130 L 420 140 L 390 150 L 380 180 L 370 150 L 340 140 L 370 130 Z" fill="url(#gradPrimary)" filter="url(#glow)"/>
  <path d="M120 140 L 125 155 L 140 160 L 125 165 L 120 180 L 115 165 L 100 160 L 115 155 Z" fill="url(#gradSecondary)"/>
</svg>
